<script>
(function(){
var q=location.search,h=location.hash;
if(!q.includes("looptrain=game")&&!h.includes("looptrain"))return;
document.documentElement.classList.add("lt-boot-hide-st");
window.addEventListener("looptrain:game-ready",function(){
document.documentElement.classList.remove("lt-boot-hide-st");
var o=document.getElementById("lt-boot-overlay");
if(o)o.remove();
});
setTimeout(function(){
if(!document.documentElement.classList.contains("lt-game-ready")){
var m=document.getElementById("lt-boot-error-msg");
if(m)m.textContent="游戏加载超时，请刷新页面";
}
},12000);
var d=document.createElement("div");
d.id="lt-boot-overlay";
d.innerHTML='<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:100%;padding:0 24px"><div style="color:#f5e6c8;font-size:clamp(28px,6vw,48px);font-weight:700;letter-spacing:.15em;animation:lt-boot-pulse 2s ease-in-out infinite;text-shadow:0 2px 20px rgba(0,0,0,.8)">循环列车-加载中...</div><div id="lt-boot-error-msg" style="color:#b54747;font-size:14px;margin-top:16px"></div></div>';
document.documentElement.appendChild(d);
})();
</script>
<style>
#lt-boot-overlay{position:fixed;inset:0;z-index:2147483647;background:linear-gradient(180deg,rgba(0,0,0,.25),rgba(0,0,0,.45)),url(/scripts/extensions/third-party/LoopTrain/a5813b6e-63a5-429c-87b2-652d33cec056.png) center/cover no-repeat;animation:lt-boot-fade-in .4s ease-out}
@keyframes lt-boot-pulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes lt-boot-fade-in{0%{opacity:0}to{opacity:1}}
html.lt-boot-hide-st{overflow:hidden!important}
html.lt-boot-hide-st body{overflow:hidden!important}
html.lt-boot-hide-st body>*:not(#lt-boot-overlay){visibility:hidden!important}
</style>
