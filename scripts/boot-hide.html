<!-- LOOPTRAIN_BOOT_SNIPPET_START -->
<style>
html.lt-boot-hide-st,html.lt-boot-hide-st body{margin:0!important;padding:0!important;width:100%!important;height:100%!important;min-height:100%!important;overflow:hidden!important;background:#050507!important}
html.lt-boot-hide-st body>*{visibility:hidden!important;pointer-events:none!important}
#lt-boot-overlay{position:fixed!important;inset:0!important;z-index:2147483647!important;width:100vw!important;height:100vh!important;height:100dvh!important;min-height:-webkit-fill-available!important;overflow:hidden!important;visibility:visible!important;pointer-events:auto!important;display:flex!important;align-items:center!important;justify-content:center!important;background-color:#050507!important;background-image:linear-gradient(rgba(0,0,0,.28),rgba(0,0,0,.70)),url('/scripts/extensions/third-party/LoopTrain/lt_mobile_boot_bg.png')!important;background-size:cover!important;background-position:center center!important;background-repeat:no-repeat!important}
#lt-boot-overlay .lt-boot-vignette{position:absolute;inset:0;background:radial-gradient(circle at center,rgba(0,0,0,.05) 0%,rgba(0,0,0,.28) 48%,rgba(0,0,0,.78) 100%);z-index:1}
#lt-boot-overlay .lt-boot-content{position:relative;z-index:2;width:min(82vw,420px);min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:calc(20px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom));transform:translateY(8vh)}
#lt-boot-overlay .lt-boot-title{color:#e5c16d;font-size:clamp(28px,8vw,44px);font-weight:800;letter-spacing:.16em;line-height:1.2;text-shadow:0 2px 12px rgba(0,0,0,.85),0 0 28px rgba(214,168,90,.25)}
#lt-boot-overlay .lt-boot-subtitle{margin-top:14px;color:rgba(245,231,190,.92);font-size:clamp(13px,3.7vw,17px);letter-spacing:.12em;line-height:1.8;text-shadow:0 2px 10px rgba(0,0,0,.9)}
#lt-boot-overlay .lt-boot-line{margin-top:24px;width:128px;height:1px;overflow:hidden;background:rgba(214,168,90,.25)}
#lt-boot-overlay .lt-boot-line::after{content:"";display:block;width:45%;height:100%;background:rgba(229,193,109,.95);animation:ltBootLine 1.6s ease-in-out infinite}
@keyframes ltBootLine{0%{transform:translateX(-120%)}100%{transform:translateX(260%)}}
#lt-boot-overlay.lt-boot-fadeout{opacity:0;transition:opacity 420ms ease}
@media (max-width:480px){#lt-boot-overlay{background-position:center center!important}#lt-boot-overlay .lt-boot-content{transform:translateY(10vh)}#lt-boot-overlay .lt-boot-title{letter-spacing:.12em}}
</style>
<script>
(function(){
var q=location.search,h=location.hash;
if(!q.includes('looptrain=game')&&!h.includes('looptrain'))return;
if(document.documentElement.classList.contains('lt-game-ready'))return;
if(window.__LOOPTRAIN_BOOT__&&window.__LOOPTRAIN_BOOT__.ready)return;
document.documentElement.classList.add('lt-boot-hide-st');
window.__LOOPTRAIN_BOOT__={startedAt:Date.now(),ready:false,release:function(){
window.__LOOPTRAIN_BOOT__.ready=true;
document.documentElement.classList.remove('lt-boot-hide-st','lt-game-timeout','lt-game-error');
document.documentElement.classList.add('lt-game-ready');
var overlay=document.getElementById('lt-boot-overlay');
if(overlay){overlay.classList.add('lt-boot-fadeout');setTimeout(function(){overlay.remove();},450);}
}};
function createOverlay(){
if(document.getElementById('lt-boot-overlay'))return;
var overlay=document.createElement('div');
overlay.id='lt-boot-overlay';
overlay.innerHTML='<div class="lt-boot-vignette"></div><div class="lt-boot-content"><div class="lt-boot-title">第七节车厢</div><div class="lt-boot-subtitle">正在载入夜行列车……</div><div class="lt-boot-line"></div><div id="lt-boot-error-msg" style="color:#f5b0b0;font-size:14px;margin-top:16px;text-shadow:0 2px 12px rgba(0,0,0,.8)"></div></div>';
document.documentElement.appendChild(overlay);
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',createOverlay);else createOverlay();
window.addEventListener('looptrain:game-ready',function(){window.__LOOPTRAIN_BOOT__.release();});
window.addEventListener('looptrain:game-error',function(event){console.error('[LoopTrain Boot] game error',event.detail);document.documentElement.classList.add('lt-game-error');var m=document.getElementById('lt-boot-error-msg');if(m)m.textContent='游戏加载失败，请刷新页面';});
setTimeout(function(){if(!window.__LOOPTRAIN_BOOT__.ready){document.documentElement.classList.add('lt-game-timeout');var m=document.getElementById('lt-boot-error-msg');if(m)m.textContent='游戏加载较慢，请稍候……';}},8000);
})();
</script>
<!-- LOOPTRAIN_BOOT_SNIPPET_END -->
