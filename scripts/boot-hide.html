<!-- LOOPTRAIN_BOOT_SNIPPET_START -->
<style>
#lt-boot-overlay{position:fixed;inset:0;z-index:2147483647;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 24px;background:linear-gradient(180deg,rgba(0,0,0,.25),rgba(0,0,0,.45)),url(/scripts/extensions/third-party/LoopTrain/a5813b6e-63a5-429c-87b2-652d33cec056.png) center/cover no-repeat;animation:lt-boot-fade-in .4s ease-out;box-sizing:border-box}
#lt-boot-overlay .lt-boot-message{color:#f5e6c8;font-size:clamp(28px,6vw,48px);font-weight:700;letter-spacing:.15em;text-shadow:0 2px 20px rgba(0,0,0,.8);animation:lt-boot-pulse 2s ease-in-out infinite;white-space:nowrap}
#lt-boot-error-msg{color:#f5b0b0;font-size:clamp(14px,3.5vw,20px);margin-top:16px;text-shadow:0 2px 12px rgba(0,0,0,.8)}
@keyframes lt-boot-pulse{0%,100%{opacity:.52}50%{opacity:1}}
@keyframes lt-boot-fade-in{0%{opacity:0}to{opacity:1}}
html.lt-boot-hide-st{overflow:hidden!important;background:#050507!important}
html.lt-boot-hide-st body{overflow:hidden!important;background:#050507!important}
html.lt-boot-hide-st body>*:not(#lt-boot-overlay){visibility:hidden!important}
</style>
<script>
(function(){
var q=location.search,h=location.hash;
if(!q.includes("looptrain=game")&&!h.includes("looptrain"))return;
if(document.documentElement.classList.contains("lt-game-ready"))return;
if(window.__LOOPTRAIN_BOOT__&&window.__LOOPTRAIN_BOOT__.gameReady)return;
if(document.getElementById("lt-boot-overlay"))return;
document.documentElement.classList.add("lt-boot-hide-st");
window.__LOOPTRAIN_BOOT__=window.__LOOPTRAIN_BOOT__||{startedAt:Date.now(),gameReady:false};
function removeBootOverlay(){
window.__LOOPTRAIN_BOOT__.gameReady=true;
document.documentElement.classList.remove("lt-boot-hide-st","lt-game-timeout","lt-game-error");
document.documentElement.classList.add("lt-game-ready");
var o=document.getElementById("lt-boot-overlay");
if(o)o.remove();
}
function mountBootOverlay(){
if(!document.body){requestAnimationFrame(mountBootOverlay);return;}
if(document.getElementById("lt-boot-overlay"))return;
var d=document.createElement("div");
d.id="lt-boot-overlay";
d.innerHTML='<div class="lt-boot-message">循环列车，加载中...</div><div id="lt-boot-error-msg"></div>';
document.body.appendChild(d);
}
window.addEventListener("looptrain:game-ready",removeBootOverlay);
window.addEventListener("looptrain:game-error",function(event){
console.error("[LoopTrain Boot] game error",event.detail);
document.documentElement.classList.add("lt-game-error");
var m=document.getElementById("lt-boot-error-msg");
if(m)m.textContent="游戏加载失败，请刷新页面";
});
setTimeout(function(){
if(!window.__LOOPTRAIN_BOOT__.gameReady){
document.documentElement.classList.add("lt-game-timeout");
var m=document.getElementById("lt-boot-error-msg");
if(m)m.textContent="游戏加载超时，请刷新页面";
}
},12000);
mountBootOverlay();
})();
</script>
<!-- LOOPTRAIN_BOOT_SNIPPET_END -->
