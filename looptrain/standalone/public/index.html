<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <base href="/" />
  <title>LoopTrain · 第七节车厢</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="lt-root">
    <div class="lt-shell">
      <div class="lt-phone">

        <!-- Stage background -->
        <div class="lt-stage"></div>

        <!-- Top bar: status -->
        <div class="lt-topbar">
          <span class="lt-topbar-left"></span>
          <span class="lt-topbar-right"></span>
          <button class="lt-audio-mute" id="btn-audio-mute" aria-label="关闭声音" title="声音开关">🔊</button>
        </div>

        <!-- Main content: scene-driven -->
        <div class="lt-content">
          <!-- Scene card -->
          <div class="lt-card lt-scene-card">
            <div class="lt-location"></div>
            <div class="lt-scene-text"></div>
            <div class="lt-current-goal"></div>
            <div class="lt-visible-npcs"></div>
          </div>

          <!-- Latest message (1-2 lines, scene-focused) -->
          <div class="lt-latest-msg"></div>
        </div>

        <!-- Log drawer (hidden, slide-up) -->
        <div class="lt-log-drawer" id="log-drawer">
          <div class="lt-log-drawer-header">
            <span>对话记录</span>
            <button class="lt-log-close" id="log-close">✕</button>
          </div>
          <div class="lt-log"></div>
        </div>

        <!-- Portrait layer (only during dialogue) -->
        <div class="lt-portrait-layer">
          <img class="lt-portrait" alt="" />
        </div>

        <!-- Dialogue panel (portrait + latest line + end button) -->
        <div class="lt-dialogue-panel">
          <div class="lt-dialogue-header">
            <span class="lt-dialogue-npc"></span>
            <button class="lt-end-dialogue-btn" id="end-dialogue-btn">结束对话</button>
          </div>
          <div class="lt-log lt-dialogue-log"></div>
        </div>

        <!-- Failure overlay -->
        <div class="lt-ng">
          <div class="lt-ng-bg"></div>
          <div class="lt-ng-card"></div>
        </div>

        <!-- Intro overlay (populated dynamically from /api/intro) -->
        <div class="lt-intro lt-show">
          <div class="lt-intro-card">
            <div class="lt-intro-kicker"></div>
            <div class="lt-intro-title"></div>
            <div class="lt-intro-steps"></div>
            <p class="lt-intro-memory"></p>
            <button class="lt-intro-btn" id="intro-start-btn">进入第七节车厢</button>
          </div>
          <div class="lt-intro-skip"></div>
        </div>

        <!-- Bottom bar: 3-tab mode -->
        <div class="lt-bottom">
          <div class="lt-mode-tabs">
            <button class="lt-mode-tab lt-active" data-mode="dialogue">对话</button>
            <button class="lt-mode-tab" data-mode="action">行动</button>
          </div>
          <div class="lt-input-row">
            <textarea class="lt-input" rows="1" placeholder="和小宁说些什么……" aria-label="游戏输入"></textarea>
            <button class="lt-btn lt-btn-send" id="btn-send">发送</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="audio-manager.js"></script>
  <script src="app.js"></script>
</body>
</html>
