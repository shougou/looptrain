<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <base href="/" />
  <title>LoopTrain · 寒灯初醒</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="lt-root">
    <div class="lt-shell">
      <div class="lt-phone">

        <!-- Stage background -->
        <div class="lt-stage"></div>

        <!-- Top bar: status -->
        <div class="lt-topbar">
          <span class="lt-topbar-left"></span>
          <span class="lt-topbar-right"></span>
          <button class="lt-audio-mute" id="btn-audio-mute" aria-label="关闭声音" title="声音开关">🔊</button>
        </div>

        <!-- Goal bar -->
        <div class="lt-goal-bar">
          <span class="lt-goal-bar-text">📋 当前目标</span>
          <span class="lt-goal-progress"></span>
          <span class="lt-goal-bar-loop"></span>
        </div>

        <!-- Command bar -->
        <div class="lt-command-bar">
          <button class="lt-cmd-btn" data-cmd="view_clues">🔍线索</button>
          <button class="lt-cmd-btn" data-cmd="view_characters">👤人物</button>
          <button class="lt-cmd-btn" data-cmd="view_memory">🧠记忆</button>
          <button class="lt-cmd-btn" data-cmd="ask_xu">❓帮助</button>
          <button class="lt-cmd-btn" id="btn-manual-reset" title="重新开始试玩版">🔄重置</button>
        </div>

        <!-- Goal completion feedback -->
        <div class="lt-goal-feedback" style="display:none;">
          <div class="lt-fb-title"></div>
          <div class="lt-fb-desc"></div>
          <div class="lt-fb-memory"></div>
          <div class="lt-fb-next"></div>
        </div>

        <!-- Main content: scene-driven -->
        <div class="lt-content">
          <!-- Scene card -->
          <div class="lt-card lt-scene-card">
            <div class="lt-location"></div>
            <div class="lt-scene-text"></div>
            <div class="lt-current-goal"></div>
            <div class="lt-visible-npcs"></div>
          </div>

          <!-- Latest message (1-2 lines, scene-focused) -->
          <div class="lt-latest-msg"></div>
        </div>

        <!-- Log drawer (hidden, slide-up) -->
        <div class="lt-log-drawer" id="log-drawer">
          <div class="lt-log-drawer-header">
            <span>对话记录</span>
            <button class="lt-log-close" id="log-close">✕</button>
          </div>
          <div class="lt-log"></div>
        </div>

        <!-- Dialogue panel (portrait + latest line + end button) -->
        <div class="lt-dialogue-panel">
          <div class="lt-dialogue-header">
            <span class="lt-dialogue-npc"></span>
            <div class="lt-portrait-dock"></div>
          </div>
          <div class="lt-log lt-dialogue-log"></div>
          <div class="lt-dialogue-footer">
            <button class="lt-end-dialogue-btn" id="end-dialogue-btn">结束对话</button>
          </div>
        </div>

        <!-- Failure overlay -->
        <div class="lt-ng">
          <div class="lt-ng-bg"></div>
          <div class="lt-ng-card"></div>
        </div>

        <!-- Reset modal (version-incompatible / legacy data detected) -->
        <div id="lt-reset-modal" class="lt-reset-overlay" style="display:none">
          <div class="lt-reset-card">
            <h2 class="lt-reset-title">新版试玩已重构</h2>
            <p class="lt-reset-body"></p>
            <button id="lt-reset-confirm" class="lt-reset-btn">重新开始</button>
          </div>
        </div>

        <!-- Intro overlay (populated dynamically from /api/intro) -->
        <div class="lt-intro lt-show">
          <div class="lt-intro-card">
            <div class="lt-intro-kicker"></div>
            <div class="lt-intro-title"></div>
            <div class="lt-intro-steps"></div>
            <p class="lt-intro-memory"></p>
            <button class="lt-intro-btn" id="intro-start-btn">进入游戏</button>
          </div>
          <div class="lt-intro-skip"></div>
        </div>

        <!-- Bottom bar: 3-tab mode -->
        <div class="lt-bottom">
          <div class="lt-mode-tabs">
            <button class="lt-mode-tab lt-active" data-mode="dialogue">对话</button>
            <button class="lt-mode-tab" data-mode="action">行动</button>
          </div>
          <div class="lt-input-row">
            <textarea class="lt-input" rows="1" placeholder="和小宁说些什么……" aria-label="游戏输入"></textarea>
            <button class="lt-btn lt-btn-send" id="btn-send">发送</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="audio-manager.js"></script>
  <script src="portrait-intro.js"></script>
  <script src="app.js"></script>
</body>
</html>
