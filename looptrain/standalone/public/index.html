<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <base href="/" />
  <title>LoopTrain · 寒灯初醒</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="lt-root">
    <div class="lt-shell">
      <div class="lt-phone">

        <!-- Stage background -->
        <div class="lt-stage"></div>

        <!-- Portrait dock (NPC portrait shrink target) -->
        <div class="lt-portrait-dock" id="lt-portrait-dock"></div>

        <!-- StatusBar region -->
        <div class="lt-status-bar" id="region-status-bar">
          <span class="lt-status-loop">第 1 轮</span>
          <span class="lt-status-sep">·</span>
          <span class="lt-status-clock">14:00</span>
          <span class="lt-status-ap">AP 10</span>
          <button class="lt-audio-mute" id="btn-audio-mute" aria-label="关闭声音" title="声音开关">🔊</button>
        </div>

        <!-- TimelineMiniBar region -->
        <div class="lt-timeline-mini" id="region-timeline-mini">
          <span class="lt-tl-start">14:00</span>
          <div class="lt-tl-track">
            <div class="lt-tl-progress" style="width: 0%"></div>
          </div>
          <span class="lt-tl-end">14:15</span>
        </div>

        <!-- Top entry buttons -->
        <div class="lt-top-entries">
          <button class="lt-entry-btn" id="btn-archive">📋 档案</button>
          <button class="lt-entry-btn" id="btn-xu">💡 许知微</button>
          <button class="lt-entry-btn lt-entry-more" id="btn-more-menu">⚙</button>
        </div>

        <!-- Main content (scrollable) -->
        <div class="lt-content" id="region-content">
          <div class="lt-objective-card" id="region-objective"></div>
          <div class="lt-scene-card" id="region-scene"></div>
          <div class="lt-focus-watch" id="region-focus-watch" style="display:none"></div>
          <div class="lt-event-feed" id="region-event-feed"></div>
        </div>

        <!-- ActionDock region -->
        <div class="lt-action-dock" id="region-action-dock"></div>

        <!-- CommandInput region -->
        <div class="lt-bottom" id="region-bottom">
          <div class="lt-mode-tabs">
            <button class="lt-mode-tab lt-active" data-mode="dialogue">对话</button>
            <button class="lt-mode-tab" data-mode="action">行动</button>
          </div>
          <div class="lt-input-row">
            <textarea class="lt-input" rows="1" placeholder="你要做什么？" aria-label="游戏输入"></textarea>
            <button class="lt-btn lt-btn-send" id="btn-send">发送</button>
          </div>
        </div>

        <!-- MoreActionsSheet overlay -->
        <div class="lt-more-actions-sheet" id="overlay-more-actions"></div>

        <!-- ArchiveSheet overlay -->
        <div class="lt-archive-sheet" id="overlay-archive"></div>

        <!-- DialogueFocusSheet overlay -->
        <div class="lt-dialogue-focus" id="overlay-dialogue-focus"></div>

        <!-- High-risk confirm overlay -->
        <div class="lt-confirm-overlay" id="overlay-confirm" style="display:none">
          <div class="lt-confirm-card">
            <div class="lt-confirm-title">高风险行动</div>
            <div class="lt-confirm-body"></div>
            <div class="lt-confirm-evidence"></div>
            <div class="lt-confirm-actions">
              <button class="lt-btn-cancel" id="lt-confirm-cancel">取消</button>
              <button class="lt-btn-confirm" id="lt-confirm-ok">继续</button>
            </div>
          </div>
        </div>

        <!-- NG (failure) overlay -->
        <div class="lt-ng" id="overlay-ng">
          <div class="lt-ng-bg"></div>
          <div class="lt-ng-card"></div>
        </div>

        <!-- Goal feedback overlay -->
        <div class="lt-goal-feedback" id="overlay-goal-feedback" style="display:none">
          <div class="lt-fb-title"></div>
          <div class="lt-fb-desc"></div>
          <div class="lt-fb-memory"></div>
          <div class="lt-fb-next"></div>
        </div>

        <!-- Reset modal -->
        <div id="lt-reset-modal" class="lt-reset-overlay" style="display:none">
          <div class="lt-reset-card">
            <h2 class="lt-reset-title">新版试玩已重构</h2>
            <p class="lt-reset-body"></p>
            <button id="lt-reset-confirm" class="lt-reset-btn">重新开始</button>
          </div>
        </div>

        <!-- More menu dropdown -->
        <div class="lt-more-menu" id="overlay-more-menu" style="display:none">
          <button class="lt-more-menu-btn" id="btn-reset-game">🔄 重置游戏</button>
        </div>

        <!-- Intro overlay -->
        <div class="lt-intro lt-show" id="overlay-intro">
          <div class="lt-intro-card">
            <div class="lt-intro-kicker"></div>
            <div class="lt-intro-title"></div>
            <div class="lt-intro-steps"></div>
            <p class="lt-intro-memory"></p>
            <button class="lt-intro-btn" id="intro-start-btn">进入游戏</button>
          </div>
          <div class="lt-intro-skip"></div>
        </div>

      </div>
    </div>
  </div>

  <script src="audio-manager.js"></script>
  <script src="portrait-intro.js"></script>
  <script src="components/utils.js"></script>
  <script src="components/layout.js"></script>
  <script src="components/actions.js"></script>
  <script src="components/feedback.js"></script>
  <script src="components/overlays.js"></script>
  <script src="app.js"></script>
</body>
</html>
