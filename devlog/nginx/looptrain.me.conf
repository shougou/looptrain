# LoopTrain production nginx site config — v0.5.0-standalone
# - / serves LoopTrain Devlog static site
# - /play/game proxies to standalone SLT runtime on 127.0.0.1:3030
# - ST legacy routes preserved on 127.0.0.1:8000 for /?looptrain=game

server {
    listen 80;
    server_name looptrain.me www.looptrain.me;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://looptrain.me$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name looptrain.me www.looptrain.me;

    ssl_certificate     /etc/letsencrypt/live/looptrain.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/looptrain.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=63072000" always;

    access_log /var/log/nginx/looptrain_access.log;
    error_log  /var/log/nginx/looptrain_error.log;

    root /var/www/looptrain-devlog/current;
    index index.html;

    # ── SLT Standalone runtime (v0.5.0) ──

    location = /play/game {
        proxy_pass http://127.0.0.1:3030/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # SLT core static files
    location = /style.css  { proxy_pass http://127.0.0.1:3030; include /etc/nginx/proxy_params; }
    location = /app.js     { proxy_pass http://127.0.0.1:3030; include /etc/nginx/proxy_params; }
    location = /favicon.ico { proxy_pass http://127.0.0.1:3030; include /etc/nginx/proxy_params; }
    location = /audio-manager.js { proxy_pass http://127.0.0.1:3030; include /etc/nginx/proxy_params; }
    location = /portrait-intro.js { proxy_pass http://127.0.0.1:3030; include /etc/nginx/proxy_params; }

    # SLT component JS files (layout.js, actions.js, utils.js, feedback.js, overlays.js)
    location ^~ /components/ {
        proxy_pass http://127.0.0.1:3030;
        include /etc/nginx/proxy_params;
    }

    # SLT game API
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3030;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 50m;
    }

    # SLT game assets (NPC portraits, backgrounds)
    location ^~ /assets/ {
        proxy_pass http://127.0.0.1:3030;
        include /etc/nginx/proxy_params;
    }

    # ── ST legacy (preserved for /?looptrain=game direct access) ──

    location = / {
        error_page 418 = @st_game;
        if ($arg_looptrain = "game") {
            return 418;
        }
        try_files /index.html =404;
    }

    # ST root files (NOT conflicting with SLT above)
    location = /script.js    { proxy_pass http://127.0.0.1:8000; include /etc/nginx/proxy_params; }
    location = /lib.js       { proxy_pass http://127.0.0.1:8000; include /etc/nginx/proxy_params; }
    location = /manifest.json { proxy_pass http://127.0.0.1:8000; include /etc/nginx/proxy_params; }
    location = /st.ico         { proxy_pass http://127.0.0.1:8000; include /etc/nginx/proxy_params; }
    location = /st-launcher.ico { proxy_pass http://127.0.0.1:8000; include /etc/nginx/proxy_params; }
    location = /csrf-token     { proxy_pass http://127.0.0.1:8000; include /etc/nginx/proxy_params; }
    location = /version        { proxy_pass http://127.0.0.1:8000; include /etc/nginx/proxy_params; }

    location ^~ /scripts/   { proxy_pass http://127.0.0.1:8000; include /etc/nginx/proxy_params; }
    location ^~ /css/       { proxy_pass http://127.0.0.1:8000; include /etc/nginx/proxy_params; }
    location ^~ /lib/       { proxy_pass http://127.0.0.1:8000; include /etc/nginx/proxy_params; }
    location ^~ /sounds/    { proxy_pass http://127.0.0.1:8000; include /etc/nginx/proxy_params; }
    location ^~ /img/       { proxy_pass http://127.0.0.1:8000; include /etc/nginx/proxy_params; }
    location ^~ /webfonts/  { proxy_pass http://127.0.0.1:8000; include /etc/nginx/proxy_params; }
    location ^~ /locales/   { proxy_pass http://127.0.0.1:8000; include /etc/nginx/proxy_params; }
    location ^~ /socket.io/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location @st_game {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 50m;
    }

    # ── Devlog static site ──

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /(?:\.git|\.env|.*\.log|.*\.bak) {
        deny all;
        return 404;
    }

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 256;
}
