# LoopTrain Devlog nginx template
#
# Purpose:
# - Serve the static Astro build from `devlog/dist` on https://looptrain.me
# - Reserve `/play/game` as the stable public game-entry path used by the website CTA
# - Map `/play/game` to the real LoopTrain game runtime at deployment time
#
# Deployment checklist:
# 1. Run `npm run build` in devlog/.
# 2. Replace `/var/www/looptrain-devlog/dist` with the actual deployed dist path.
# 3. Replace `http://127.0.0.1:3030/` with the real SLT runtime URL/path.
#    Current SLT local target shape: `http://127.0.0.1:3030/`.
#    Do not point this route back to a SillyTavern runtime.
# 4. Keep `/play/game` stable so frontend links do not need to change.
# 5. Ensure HTTPS certificates are configured before exposing publicly.

server {
    listen 80;
    server_name looptrain.me www.looptrain.me;
    return 301 https://looptrain.me$request_uri;
}

server {
    listen 443 ssl http2;
    server_name looptrain.me;

    # TODO(deploy): set certificate paths.
    # ssl_certificate /etc/letsencrypt/live/looptrain.me/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/looptrain.me/privkey.pem;

    root /var/www/looptrain-devlog/dist;
    index index.html;

    # Static site pages generated by Astro.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Stable public game entry used by site buttons: /play/game
    # TODO(deploy): point this to the real SLT runtime after final approval.
    location = /play/game {
        proxy_pass http://127.0.0.1:3030/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # SLT API/static assets may need additional proxy locations after production hardening.
    # Example only; enable after checking the real runtime asset paths:
    # location /api/ {
    #     proxy_pass http://127.0.0.1:3030/api/;
    # }

    # Security: do not expose hidden/internal files.
    location ~ /(?:\.git|\.env|.*\.log|.*\.bak) {
        deny all;
        return 404;
    }

    # Cache static assets.
    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|webp|avif|ico)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
