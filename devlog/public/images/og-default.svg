  <!-- Scanlines -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#6cc7d9" stroke-width="1"/>
    <line x1="0" y1="3" x2="1200" y2="3" stroke="#6cc7d9" stroke-width="1"/>
    <line x1="0" y1="6" x2="1200" y2="6" stroke="#6cc7d9" stroke-width="1"/>
    <line x1="0" y1="9" x2="1200" y2="9" stroke="#6cc7d9" stroke-width="1"/>
  </g>
